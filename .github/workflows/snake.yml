name: Generate Snake Animation

on:
  # Jalankan otomatis setiap 24 jam sekali (tengah malam)
  schedule:
    - cron: "0 0 * * *" 
  
  # Mengizinkan Anda menjalankan action ini secara manual dari tab Actions di GitHub
  workflow_dispatch:
  
  # Jalankan otomatis saat Anda mem-push perubahan ke branch main/master
  push:
    branches:
    - main
    - master

jobs:
  generate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      # Step 1: Mengenerate gambar animasi ular (SVG) dari kontribusi Anda
      - name: generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
        env:
          # Menggunakan Personal Access Token (PAT) untuk membaca kontribusi private
          GITHUB_TOKEN: ${{ secrets.PAT_SNAKE }}
      # Step 2: Mengupload/push file SVG yang dihasilkan ke branch bernama 'output'
      - name: push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
